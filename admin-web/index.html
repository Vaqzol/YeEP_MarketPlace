<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YeEP Admin — เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🛒</div>
        <div>
          <h1>YeEP Admin</h1>
          <p>ศูนย์ควบคุมตลาดกลาง</p>
        </div>
      </div>

      <h2 class="login-title">เข้าสู่ระบบ</h2>
      <p class="login-subtitle">เฉพาะผู้ดูแลระบบเท่านั้น</p>

      <div id="errorMsg" class="error-msg">❌ <span id="errorText"></span></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" class="form-input" placeholder="admin@yeep.com" required />
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" id="loginBtn" class="btn-primary">เข้าสู่ระบบ</button>
      </form>
    </div>
  </div>

  <!-- Firebase 9 Compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBX_1GNx-xoiaohcnTL6TYbQeVBmm6ppRY",
      authDomain: "yeep-marketplace.firebaseapp.com",
      projectId: "yeep-marketplace",
      storageBucket: "yeep-marketplace.firebasestorage.app",
      messagingSenderId: "20249950154",
      appId: "1:20249950154:web:8f2c108206fc170e628133"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ถ้า Login อยู่แล้ว → ไป dashboard ทันที
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const snap = await db.collection('users').doc(user.uid).get();
        if (snap.exists && snap.data().role === 'admin') {
          window.location.href = 'dashboard.html';
        }
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');
      const errText = document.getElementById('errorText');

      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      btn.disabled = true;
      errMsg.classList.remove('visible');

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const snap = await db.collection('users').doc(cred.user.uid).get();

        if (!snap.exists || snap.data().role !== 'admin') {
          await auth.signOut();
          errText.textContent = 'บัญชีนี้ไม่มีสิทธิ์เข้าระบบ Admin';
          errMsg.classList.add('visible');
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        errText.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        errMsg.classList.add('visible');
      } finally {
        btn.textContent = 'เข้าสู่ระบบ';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
